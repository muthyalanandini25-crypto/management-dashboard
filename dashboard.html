<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f4f4f4;
    }

    .header {
      background: #2c3e50;
      color: white;
      padding: 15px;
      text-align: center;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      text-align: center;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.3s;
    }

    .card:hover {
      background: #3498db;
      color: white;
    }
  </style>
</head>
<body>

<div class="header">
  <h2>📊 Management Dashboard</h2>
</div>

<div class="grid">
  <div class="card">👨‍🎓 Students</div>
  <div class="card">📅 Attendance</div>
  <div class="card">💰 Fees</div>
  <div class="card">📈 Reports</div>
</div>

</body>
</html>
