<!DOCTYPE html>
<html>
<head>
    <title>Bus Timings</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f4f7fc;
            margin:20px;
        }

        h1{
            text-align:center;
            color:#003366;
        }

        .card{
            background:white;
            padding:20px;
            margin:10px 0;
            border-radius:10px;
            box-shadow:0 2px 5px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

<h1>🕒 Bus Timings</h1>

<div class="card">
    <h3>Morning Trip</h3>
    <p>Rajampet: 8:00 AM</p>
    <p>University Arrival: 8:45 AM</p>
</div>

<div class="card">
    <h3>Evening Trip</h3>
    <p>University Departure: 4:30 PM</p>
    <p>Rajampet Arrival: 5:15 PM</p>
</div>

</body>
</html>
