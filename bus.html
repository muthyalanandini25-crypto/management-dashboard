<!DOCTYPE html>
<html>
<head>
    <title>AU Bus Tracking</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            background: #f4f7fc;
            margin: 20px;
        }

        .card{
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin: 10px 0;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        h1{
            color: #003366;
            text-align: center;
        }
    </style>
</head>
<body>

<h1>🚌 Annamacharya University Bus Tracking</h1>

<div class="card">
    <h3>Bus Number</h3>
    <p>AU-01</p>
</div>

<div class="card">
    <h3>Route</h3>
    <p>Rajampet → University</p>
</div>

<div class="card">
    <h3>Driver</h3>
    <p>Ramesh</p>
</div>

<div class="card">
    <h3>Current Location</h3>
    <p>Near Railway Station</p>
</div>

<div class="card">
    <h3>Status</h3>
    <p>🟢 Moving</p>
</div>

</body>
</html>
